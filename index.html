<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitter Brownie - Pedido Online</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--dark:#3d2321;
--gold:#b08d57;
--cream:#fffaf5;
--success:#25d366;
}

body{
font-family:'Poppins',sans-serif;
background:var(--cream);
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{
max-width:480px;
width:100%;
background:white;
border-radius:25px;
padding:25px;
box-shadow:0 15px 30px rgba(0,0,0,0.08);
text-align:center;
}

h1{
color:var(--dark);
margin-bottom:5px;
}

.subtitle{
color:var(--gold);
font-size:14px;
margin-bottom:20px;
}

.section{
text-align:left;
margin-top:20px;
font-weight:600;
border-left:4px solid var(--gold);
padding-left:10px;
margin-bottom:10px;
}

.input-group{
margin-bottom:15px;
text-align:left;
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #eee;
font-family:'Poppins';
}

.product{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
border-radius:15px;
border:2px solid #f5f5f5;
margin-bottom:10px;
}

.product.selected{
border-color:var(--gold);
background:#fffdfa;
}

.qty{
display:flex;
align-items:center;
gap:10px;
}

button.qtybtn{
width:26px;
height:26px;
border:none;
border-radius:50%;
background:var(--gold);
color:white;
font-weight:bold;
cursor:pointer;
}

.totalbox{
margin-top:20px;
background:#faf6f0;
padding:20px;
border-radius:15px;
}

.total{
font-size:26px;
font-weight:800;
}

.orderbtn{
margin-top:10px;
width:100%;
padding:15px;
border:none;
background:var(--success);
color:white;
font-size:16px;
font-weight:bold;
border-radius:12px;
cursor:pointer;
}

.orderbtn:disabled{
background:#ccc;
}

#campo-endereco{
display:none;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Bitter Brownie</h1>
<div class="subtitle">Sabor intenso, marcante e irresistível</div>

<div class="input-group">
<label>Seu nome</label>
<input id="nome">
</div>

<div class="section">Escolha seus brownies</div>

<div class="product" id="card-tradicional">
<div>Brownie Tradicional<br><b>R$10</b></div>
<div class="qty">
<button class="qtybtn" onclick="updateQty('tradicional',-1)">-</button>
<span id="qty-tradicional">0</span>
<button class="qtybtn" onclick="updateQty('tradicional',1)">+</button>
</div>
</div>

<div class="product" id="card-nozes">
<div>Brownie com Nozes<br><b>R$12</b></div>
<div class="qty">
<button class="qtybtn" onclick="updateQty('nozes',-1)">-</button>
<span id="qty-nozes">0</span>
<button class="qtybtn" onclick="updateQty('nozes',1)">+</button>
</div>
</div>

<div class="product" id="card-ninho">
<div>Brownie Leite Ninho<br><b>R$15</b></div>
<div class="qty">
<button class="qtybtn" onclick="updateQty('ninho',-1)">-</button>
<span id="qty-ninho">0</span>
<button class="qtybtn" onclick="updateQty('ninho',1)">+</button>
</div>
</div>

<div class="product" id="card-brigadeiro">
<div>Brownie Brigadeiro<br><b>R$15</b></div>
<div class="qty">
<button class="qtybtn" onclick="updateQty('brigadeiro',-1)">-</button>
<span id="qty-brigadeiro">0</span>
<button class="qtybtn" onclick="updateQty('brigadeiro',1)">+</button>
</div>
</div>

<div class="product" id="card-ninhobrig">
<div>Brownie Ninho c/ Brigadeiro<br><b>R$15</b></div>
<div class="qty">
<button class="qtybtn" onclick="updateQty('ninhobrig',-1)">-</button>
<span id="qty-ninhobrig">0</span>
<button class="qtybtn" onclick="updateQty('ninhobrig',1)">+</button>
</div>
</div>

<div class="product" id="card-bolinha">
<div>Bolinha de Brownie<br><b>R$10</b></div>
<div class="qty">
<button class="qtybtn" onclick="updateQty('bolinha',-1)">-</button>
<span id="qty-bolinha">0</span>
<button class="qtybtn" onclick="updateQty('bolinha',1)">+</button>
</div>
</div>

<div class="section">Entrega</div>

<div class="input-group">
<select id="entrega" onchange="toggleEndereco()">
<option value="Retirada">Retirada</option>
<option value="Entrega">Entrega</option>
</select>

<div id="campo-endereco">
<input id="endereco" placeholder="Rua, número e bairro">
</div>
</div>

<div class="input-group">
<label>Pagamento</label>
<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>
</div>

<div class="input-group">
<label>Observações</label>
<textarea id="obs"></textarea>
</div>

<div class="totalbox">

<div>Total</div>
<div class="total" id="total">R$0,00</div>

<button class="orderbtn" id="btn" onclick="send()" disabled>
Finalizar Pedido no WhatsApp
</button>

</div>

</div>

<script>

let q={
tradicional:0,
nozes:0,
ninho:0,
brigadeiro:0,
ninhobrig:0,
bolinha:0
}

let p={
tradicional:10,
nozes:12,
ninho:15,
brigadeiro:15,
ninhobrig:15,
bolinha:10
}

function updateQty(i,c){

q[i]=Math.max(0,q[i]+c)

document.getElementById("qty-"+i).innerText=q[i]

let card=document.getElementById("card-"+i)

if(q[i]>0)card.classList.add("selected")
else card.classList.remove("selected")

calc()

}

function calc(){

let t=0

for(let i in q){
t+=q[i]*p[i]
}

document.getElementById("total").innerText="R$ "+t.toFixed(2).replace(".",",")

document.getElementById("btn").disabled=t<=0

}

function toggleEndereco(){

let e=document.getElementById("entrega").value

document.getElementById("campo-endereco").style.display=
e==="Entrega"?"block":"none"

}

function send(){

let nome=document.getElementById("nome").value
let entrega=document.getElementById("entrega").value
let endereco=document.getElementById("endereco").value
let pag=document.getElementById("pagamento").value
let obs=document.getElementById("obs").value

if(!nome){
alert("Informe seu nome")
return
}

if(entrega==="Entrega" && !endereco){
alert("Informe o endereço")
return
}

let phone="5534991064205"

let msg="🧁 *NOVO PEDIDO - BITTER BROWNIE*\n\n"

msg+="👤 *Cliente:* "+nome+"\n"
msg+="🛍 *Entrega:* "+entrega+"\n"

if(entrega==="Entrega")
msg+="📍 *Endereço:* "+endereco+"\n"

msg+="💳 *Pagamento:* "+pag+"\n"

if(obs)
msg+="📝 *Obs:* "+obs+"\n"

msg+="\n📦 *ITENS*\n"

if(q.tradicional)msg+="• "+q.tradicional+"x Brownie Tradicional\n"
if(q.nozes)msg+="• "+q.nozes+"x Brownie com Nozes\n"
if(q.ninho)msg+="• "+q.ninho+"x Brownie Leite Ninho\n"
if(q.brigadeiro)msg+="• "+q.brigadeiro+"x Brownie Brigadeiro\n"
if(q.ninhobrig)msg+="• "+q.ninhobrig+"x Brownie Ninho c/ Brigadeiro\n"
if(q.bolinha)msg+="• "+q.bolinha+"x Bolinha de Brownie\n"

let t=0
for(let i in q){t+=q[i]*p[i]}

msg+="\n💰 *TOTAL: R$ "+t.toFixed(2).replace(".",",")+"*"

window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg))

}

</script>

</body>
</html>
