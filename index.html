<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bitter Brownie - Pedido Online</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--brown:#3d2321;
--gold:#b08d57;
--cream:#fffaf5;
--success:#25d366;
}

body{
font-family:'Poppins',sans-serif;
background:var(--cream);
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:500px;
background:white;
border-radius:25px;
padding:30px;
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

h1{
text-align:center;
color:var(--brown);
}

.subtitle{
text-align:center;
color:var(--gold);
margin-bottom:25px;
}

.section{
font-weight:600;
margin:25px 0 10px;
border-left:4px solid var(--gold);
padding-left:10px;
}

.product{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
border-radius:16px;
border:2px solid #f5f5f5;
margin-bottom:12px;
}

.product.selected{
border-color:var(--gold);
background:#fffdfa;
}

.product-info{
display:flex;
flex-direction:column;
}

.product-price{
font-weight:700;
}

.qty{
display:flex;
align-items:center;
gap:12px;
}

.qtybtn{
width:28px;
height:28px;
border:none;
border-radius:50%;
background:var(--gold);
color:white;
font-weight:bold;
cursor:pointer;
}

.totalbox{
margin-top:25px;
background:#faf6f0;
padding:20px;
border-radius:15px;
text-align:center;
}

.total{
font-size:28px;
font-weight:800;
}

.orderbtn{
width:100%;
padding:16px;
background:var(--success);
border:none;
border-radius:12px;
color:white;
font-weight:bold;
cursor:pointer;
}

.orderbtn:disabled{
background:#ccc;
}

input,select,textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #eee;
margin-bottom:10px;
}

#campo-endereco{
display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Bitter Brownie</h1>
<div class="subtitle">Sabor intenso, marcante e irresistível</div>

<input id="nome" placeholder="Seu nome">

<div class="section">Escolha seus brownies</div>

<!-- PRODUTOS -->

<script>
const produtos = {
tradicional:{nome:"Brownie Tradicional",preco:10},
nozes:{nome:"Brownie com Nozes",preco:12},
ninho:{nome:"Brownie Recheado com Leite Ninho",preco:20},
brigadeiro:{nome:"Brownie Recheado com Brigadeiro",preco:20},
ninhobrig:{nome:"Brownie Ninho com Brigadeiro",preco:20},
nutella:{nome:"Brownie de Nutella",preco:20},
ninhonutella:{nome:"Brownie Ninho com Nutella",preco:20},
bolinha:{nome:"Bolinha de Brownie",preco:15}
};

let q={};
for(let i in produtos){ q[i]=0; }
</script>

<div id="lista"></div>

<div class="section">Entrega</div>

<select id="entrega" onchange="toggleEndereco()">
<option value="Retirada">Retirada</option>
<option value="Entrega">Entrega</option>
</select>

<div id="campo-endereco">
<input id="endereco" placeholder="Rua, número e bairro">
</div>

<select id="pagamento">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>

<textarea id="obs" placeholder="Observações"></textarea>

<div class="totalbox">
<div>Total</div>
<div class="total" id="total">R$0,00</div>
<button id="btn" class="orderbtn" onclick="send()" disabled>
Finalizar Pedido no WhatsApp
</button>
</div>

</div>

<script>

// gerar produtos dinamicamente
const lista = document.getElementById("lista");

for(let key in produtos){

const p = produtos[key];

lista.innerHTML += `
<div class="product" id="card-${key}">
<div class="product-info">
<span>${p.nome}</span>
<span class="product-price">R$${p.preco}</span>
</div>

<div class="qty">
<button class="qtybtn" onclick="updateQty('${key}',-1)">-</button>
<span id="qty-${key}">0</span>
<button class="qtybtn" onclick="updateQty('${key}',1)">+</button>
</div>
</div>
`;
}

function updateQty(i,c){

q[i]=Math.max(0,q[i]+c)

document.getElementById("qty-"+i).innerText=q[i]

let card=document.getElementById("card-"+i)

if(q[i]>0)card.classList.add("selected")
else card.classList.remove("selected")

calc()
}

function calc(){

let t=0

for(let i in q){
t+=q[i]*produtos[i].preco
}

document.getElementById("total").innerText="R$ "+t.toFixed(2).replace(".",",")

document.getElementById("btn").disabled=t<=0
}

function toggleEndereco(){
document.getElementById("campo-endereco").style.display =
document.getElementById("entrega").value==="Entrega"?"block":"none";
}

function send(){

let nome=document.getElementById("nome").value
let entrega=document.getElementById("entrega").value
let endereco=document.getElementById("endereco").value
let pag=document.getElementById("pagamento").value
let obs=document.getElementById("obs").value

if(!nome){ alert("Informe seu nome"); return; }
if(entrega==="Entrega" && !endereco){ alert("Informe o endereço"); return; }

let msg="🧁 *NOVO PEDIDO - BITTER BROWNIE*\n\n"

msg+=`👤 *Cliente:* ${nome}\n`
msg+=`🛍 *Entrega:* ${entrega}\n`

if(entrega==="Entrega")
msg+=`📍 *Endereço:* ${endereco}\n`

msg+=`💳 *Pagamento:* ${pag}\n`

if(obs)
msg+=`📝 *Obs:* ${obs}\n`

msg+="\n📦 *ITENS*\n"

for(let i in q){
if(q[i]>0){
msg+=`• ${q[i]}x ${produtos[i].nome}\n`
}
}

let t=0
for(let i in q){ t+=q[i]*produtos[i].preco }

msg+=`\n💰 *TOTAL: R$ ${t.toFixed(2).replace('.',',')}*`

window.open("https://wa.me/5534991064205?text="+encodeURIComponent(msg))

}

</script>

</body>
</html>
