<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitter Brownie</title>
<style>
body{font-family:Arial,sans-serif;background:#fffaf5;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h1{text-align:center;color:#3d2321}
.section{margin-top:20px;padding-bottom:8px;border-bottom:2px solid #b08d57;color:#3d2321}
.product{display:flex;justify-content:space-between;align-items:center;padding:10px;border:1px solid #eee;margin:8px 0;border-radius:10px}
.qty button{width:30px;height:30px}
.total{position:sticky;bottom:0;background:#fff;padding:15px;border-top:2px solid #b08d57;font-size:24px;font-weight:bold}
button.send{width:100%;padding:14px;background:#25d366;color:white;border:none;border-radius:10px}
</style>
</head>
<body>
<div class="container">
<h1>Bitter Brownie</h1>
<input id="nome" placeholder="Seu nome" style="width:100%;padding:10px">
<div id="produtos"></div>
<div class="total">
Total: <span id="total">R$ 0,00</span>
<button class="send" onclick="enviar()">Finalizar no WhatsApp</button>
</div>
</div>
<script>
const produtos={
tradicional:["Brownie Tradicional",8,"Brownies"],
nozes:["Brownie com Nozes",10,"Brownies"],
ninho:["Brownie Recheado Ninho",12,"Brownies"],
brigadeiro:["Brownie Recheado Brigadeiro",12,"Brownies"],
nutella:["Brownie Recheado Nutella",12,"Brownies"],
ferreiro:["Brownie Recheado Ferreiro",12,"Brownies"],
kinder:["Brownie Recheado Kinder",12,"Brownies"],
copoMorango:["Copo da Felicidade Morango",22,"Copos"],
copoNutella:["Copo da Felicidade Nutella",22,"Copos"],
copoFerreiro:["Copo da Felicidade Ferreiro",22,"Copos"],
copoKinder:["Copo da Felicidade Kinder",22,"Copos"],
hambMorango:["Hambúrguer de Morango",30,"Hambúrgueres"],
hambNutella:["Hambúrguer de Nutella",30,"Hambúrgueres"],
hambFerreiro:["Hambúrguer de Ferreiro",30,"Hambúrgueres"]
};
const q={};
const div=document.getElementById('produtos');
['Brownies','Copos','Hambúrgueres'].forEach(sec=>{
div.innerHTML+=`<h2 class="section">${sec}</h2>`;
for(const k in produtos){
if(produtos[k][2]!==sec) continue;
q[k]=0;
div.innerHTML+=`<div class="product"><div>${produtos[k][0]}<br>R$ ${produtos[k][1].toFixed(2).replace('.',',')}</div>
<div class="qty"><button onclick="alt('${k}',-1)">-</button>
<span id="q_${k}">0</span>
<button onclick="alt('${k}',1)">+</button></div></div>`;
}
});
function alt(k,v){q[k]=Math.max(0,q[k]+v);document.getElementById('q_'+k).innerText=q[k];calc();}
function calc(){let t=0;for(const k in q)t+=q[k]*produtos[k][1];document.getElementById('total').innerText='R$ '+t.toFixed(2).replace('.',',');}
function enviar(){
let nome=document.getElementById('nome').value||'Cliente';
let msg='🧁 *NOVO PEDIDO - BITTER BROWNIE*\n\n👤 '+nome+'\n\n📦 *ITENS*\n';
let total=0;
for(const k in q){if(q[k]>0){msg+='• '+q[k]+'x '+produtos[k][0]+'\n';total+=q[k]*produtos[k][1];}}
msg+='\n💰 *TOTAL: R$ '+total.toFixed(2).replace('.',',')+'*';
window.open('https://wa.me/5534991064205?text='+encodeURIComponent(msg));
}
</script>
</body>
</html>
